name: 'DAB deployment'

# Ensure that only a single job or workflow using the same concurrency group
# runs at a time.
concurrency: 1

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run against'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
          
permissions:
  # These permissions are required for workload identity federation.
  id-token: write
  contents: read

jobs:
  get-sp-oauth-token:
    name: 'CI/CD pipeline'
    runs-on: ubuntu-latest
     # Configure current environment
    environment: ${{ github.event.inputs.environment }}
    outputs:
      version_number: ${{ steps.vars.outputs.OAUTH_TOKEN }}
    steps:
      - name: Get Oath token with rest api
        id: vars
        run: |
          RESPONSE=$(curl --request POST --url ${{ vars.HOST }}'/oidc/v1/token' --user ${{ secrets.CLIENT_ID }}:${{ secrets.CLIENT_SECRET }} --data 'grant_type=client_credentials&scope=all-apis')
          OAUTH_TOKEN=$(echo $response | jq -r '.access_token')

      - name: store token into env variable
        run: echo "saving oath token into env variable"
        env:  
          OAUTH_TOKEN: ${{ steps.vars.outputs.OAUTH_TOKEN }}
          
  # Bundle validation is automatically performed as part of this deployment.
  # If validation fails, this workflow fails.
  deploy:
    name: 'Deploy bundle'
    runs-on: ubuntu-latest

    steps:
      # Check out this repo, so that this workflow can access it.
      - uses: actions/checkout@v3

      # Download the Databricks CLI.
      # See https://github.com/databricks/setup-cli
      - uses: databricks/setup-cli@main

      # Deploy the bundle to the target environment as defined by user input
      # in the bundle's settings file.
      - run: databricks bundle deploy -t ${{ github.event.inputs.environment }}
        working-directory: .
        env:
          DATABRICKS_TOKEN: ${{ env.OAUTH_TOKEN }}
          DATABRICKS_BUNDLE_ENV: ${{ github.event.inputs.environment }}
    
    
