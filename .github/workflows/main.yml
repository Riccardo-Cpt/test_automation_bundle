on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run against'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  get-sp-oauth-token:
    runs-on: ubuntu-latest
     # Configure current environment
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Print environment variables
        run: |
          response=$(curl --request POST --url ${{ vars.HOST }}'/oidc/v1/token' --user ${{ secrets.CLIENT_ID }}:${{ secrets.CLIENT_SECRET }} --data 'grant_type=client_credentials&scope=all-apis')
          echo $response
