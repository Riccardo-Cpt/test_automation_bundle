name: 'DAB deployment'

# Ensure that only a single job or workflow using the same concurrency group
# runs at a time.
concurrency: 1

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run against'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
          
permissions:
  # These permissions are required for workload identity federation.
  id-token: write
  contents: read


jobs:
  deploy:
    runs-on: ubuntu-latest
    name: 'Update git folder'
    environment: ${{ github.event.inputs.environment }}
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: ${{ vars.HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.CLIENT_ID }} # This is the service principal UUID.

    steps:
      - uses: actions/checkout@v3
      - uses: databricks/setup-cli@main
      - name: Update git folder
        # Set your workspace path and branch name here
        run: databricks repos update /Workspace/Users/riccardo.9giuliani.6@gmail.com/test_automation_bundle --branch master


    
    
