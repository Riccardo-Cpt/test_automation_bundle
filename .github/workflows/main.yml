name: 'DAB deployment'

# Ensure that only a single job or workflow using the same concurrency group
# runs at a time.
concurrency: 1

on:
  workflow_dispatch:
    inputs:
      environment:     
        description: 'Environment to run against'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
        
       
jobs:
  # This first job obtains OICD OAUTH token for service principal through API
  get-sp-oauth-token:
    name: 'Get Oauth token for service principal'
    runs-on: ubuntu-latest
    # Configure current environment
    environment: ${{ github.event.inputs.environment }}
    outputs:
      token_file: ./token.txt  # Just for reference, not the actual token
    steps:
      - name: Get Oath token with rest api
        id: get_token
        run: |
          RESPONSE=$(curl --request POST --url ${{ vars.HOST }}'/oidc/v1/token' --user ${{ secrets.CLIENT_ID }}:${{ secrets.CLIENT_SECRET }} --data 'grant_type=client_credentials&scope=all-apis')
          echo "$(echo $RESPONSE | jq -r '.access_token')" > ./token.txt
      - uses: actions/upload-artifact@v7
        with:
          name: oauth-sp-token-path
          path: ./token.txt
          retention-days: 1
          
  build:
    name: 'Update databricks repo'
    runs-on: ubuntu-latest
    needs: [get-sp-oauth-token]
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - uses: actions/download-artifact@v8
        with:
          name: oauth-sp-token-path
          path: ./
      - name: Export token from file to env
        run: export "DATABRICKS_TOKEN=$(cat ./token.txt)" >> $GITHUB_ENV
      - run: databricks repos update 4436606296878746
        working-directory: .
        env:
          DATABRICKS_TOKEN: ${{ vars.DATABRICKS_TOKEN }}
          DATABRICKS_BUNDLE_ENV: ${{ github.event.inputs.environment }}

  
  # Bundle validation is automatically performed as part of this deployment.
  # If validation fails, this workflow fails.
  # This second job deploy the bundle directly to databricks workspace, authenticating with token previously obtained
  deploy:
    name: 'Deploy bundle'
    runs-on: ubuntu-latest
    needs: [get-sp-oauth-token]
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - uses: actions/download-artifact@v8
        with:
          name: oauth-sp-token-path
          path: ./
      - name: Export token from file to env
        run: echo "DATABRICKS_TOKEN=$(cat ./token.txt)" >> $GITHUB_ENV
      - run: databricks bundle deploy
        working-directory: .
        env:
          DATABRICKS_TOKEN: ${{ vars.DATABRICKS_TOKEN }}
          DATABRICKS_BUNDLE_ENV: ${{ github.event.inputs.environment }}


      
      

  




    
    
