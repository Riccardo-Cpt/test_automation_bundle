    mode: development
    default: true
    workspace:
      host: https://dbc-5f048565-f44c.cloud.databricks.com
      root_path: ~/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: username1_dev
      schema: dev
    permissions:
          - user_name: riccardo.9giuliani.6@gmail.com
            level: CAN_MANAGE
          - service_principal_name: '71177765-27d4-40e0-abd6-b589ac8e7c0e'
            level: CAN_MANAGE
  prod:
    mode: production
    workspace:
      host: https://dbc-5f048565-f44c.cloud.databricks.com
